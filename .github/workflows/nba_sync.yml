name: NBA Supabase Sync

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync_players:
    name: Sync players (daily)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 5 * * *'
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Run player sync
        run: python scripts/nba_scraper.py --mode players

  sync_shots:
    name: Sync shots (every trigger)
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Run shot sync
        run: python scripts/nba_scraper.py --mode shots
