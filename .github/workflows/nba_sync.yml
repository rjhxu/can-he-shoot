name: NBA Supabase Sync

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  sync_players:
    name: Sync players (weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * 0'
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Run player sync
        run: python scripts/nba_scraper.py --mode players

  sync_shots:
    name: Sync shots (daily 3AM EST)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * *'
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Sync regular-season shots
        run: python scripts/nba_scraper.py --mode shots --season-type "Regular Season"

      - name: Sync playoff shots
        run: python scripts/nba_scraper.py --mode shots --season-type Playoffs
